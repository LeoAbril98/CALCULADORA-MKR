<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Cotação de Expedição v2.1</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117;
            --surface: #181c27;
            --surface2: #1f2536;
            --border: #2a3045;
            --accent: #3b82f6;
            --accent2: #60a5fa;
            --accent-glow: rgba(59,130,246,0.18);
            --text: #e8eaf0;
            --muted: #7a859e;
            --danger: #ef4444;
            --success: #22c55e;
            --radius: 12px;
            --mono: 'DM Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px 14px;
            display: flex;
            justify-content: center;
        }

        .wrap { 
            width: 100%; 
            max-width: 1100px; 
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            margin-bottom: 10px; 
        }

        .logo {
            width: 48px; height: 48px; border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), #1d4ed8);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; box-shadow: 0 0 20px var(--accent-glow);
        }

        header h1 { font-size: 1.2rem; font-weight: 700; }
        header p { font-size: 0.8rem; color: var(--muted); }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            align-items: start;
        }

        @media (min-width: 900px) {
            .main-grid {
                grid-template-columns: 400px 1fr;
            }
            .sticky-side {
                position: sticky;
                top: 20px;
            }
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 0.65rem; font-weight: 800; letter-spacing: 0.12em;
            text-transform: uppercase; color: var(--muted);
            margin-bottom: 18px; display: flex; align-items: center; gap: 10px;
        }
        .card-title::after { content:''; flex:1; height:1px; background:var(--border); }

        .tabs { display: flex; gap: 6px; margin-bottom: 16px; }
        .tab {
            flex: 1; padding: 10px 5px; text-align: center; border-radius: 10px;
            border: 1px solid var(--border); background: var(--surface2);
            color: var(--muted); font-size: 0.8rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .tab.active {
            background: var(--accent); border-color: var(--accent); color: #fff;
        }

        .field { margin-bottom: 15px; }
        label { font-size: 0.75rem; font-weight: 600; color: var(--muted); display: block; margin-bottom: 6px; }

        input, select {
            width: 100%; background: var(--surface2); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 12px;
            color: var(--text); font-family: inherit; font-size: 16px;
        }

        .info-box {
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 10px; padding: 10px; font-family: var(--mono);
            font-size: 0.75rem; min-height: 48px; display: flex; align-items: center;
        }

        .toggle-row {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--surface2); padding: 12px; border-radius: var(--radius);
            margin-bottom: 15px; border: 1px solid var(--border);
        }
        
        .toggle { position: relative; width: 44px; height: 24px; }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; inset: 0; background: var(--border);
            border-radius: 24px; cursor: pointer; transition: .2s;
        }
        .slider::before {
            content:''; position:absolute; width:18px; height:18px;
            left:3px; top:3px; background:#fff; border-radius:50%; transition: .2s;
        }
        .toggle input:checked + .slider { background: var(--accent); }
        .toggle input:checked + .slider::before { transform: translateX(20px); }

        .btn-add {
            width: 100%; padding: 16px; border-radius: var(--radius); border: none;
            background: linear-gradient(135deg, var(--accent), #1d4ed8);
            color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 15px rgba(59,130,246,0.3);
        }

        .items-empty { text-align: center; color: var(--muted); padding: 40px 0; font-size: 0.9rem; }
        .item-card {
            display: flex; align-items: center; gap: 12px;
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 12px; padding: 12px; margin-bottom: 10px;
        }
        .item-left { flex: 1; }
        .item-aro { font-weight: 700; color: var(--text); font-family: var(--mono); }
        
        .badge {
            font-size: 0.6rem; font-weight: 800; padding: 2px 8px; 
            border-radius: 10px; text-transform: uppercase; margin-right: 5px;
        }
        .badge-on { background: rgba(34,197,94,0.15); color: var(--success); }
        .badge-off { background: rgba(239,68,68,0.1); color: var(--danger); }

        .result-card {
            background: linear-gradient(160deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid rgba(59,130,246,0.3); border-radius: 18px; padding: 20px;
        }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-box { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 15px 5px; text-align: center; }
        .stat-val { font-size: 1.5rem; font-weight: 700; color: var(--accent2); font-family: var(--mono); }
        .stat-lbl { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; margin-top: 4px; }

        .vol-row { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 6px; }
        .vol-count { color: var(--accent2); font-weight: 800; margin-right: 8px; }
        
        .btn-del { background: none; border: none; color: var(--muted); cursor: pointer; padding: 5px; }
    </style>
</head>
<body>

<div class="wrap">
    <header>
        <div class="logo">🚗</div>
        <div>
            <h1>Cotação de Expedição</h1>
            <p>Calculadora de volumes para logística</p>
        </div>
    </header>

    <main class="main-grid">
        <div class="sticky-side">
            <div class="card">
                <div class="card-title">Adicionar Produto</div>
                
                <div class="tabs">
                    <div class="tab active" onclick="setTipo('PASSEIO')">🚙 Passeio</div>
                    <div class="tab" onclick="setTipo('4x4')">🛻 4×4</div>
                    <div class="tab" onclick="setTipo('PNEUS')">⭕ Pneus</div>
                </div>

                <div class="field">
                    <label>Filtrar Modelo</label>
                    <input type="text" id="search" placeholder="Digite aro ou medida..." oninput="popularItens()">
                </div>

                <div class="field">
                    <label>Modelo Selecionado</label>
                    <select id="item" size="5" onchange="atualizarInfo()"></select>
                </div>

                <div class="field">
                    <label>Dados da Peça</label>
                    <div class="info-box" id="itemInfo">—</div>
                </div>

                <div class="field">
                    <label>Quantidade de Peças</label>
                    <input type="number" id="quantidade" value="4" min="1">
                </div>

                <div class="toggle-row">
                    <div>
                        <div style="font-size:0.85rem; font-weight:600">Embalar juntas</div>
                        <div style="font-size:0.7rem; color:var(--muted)">Empilha 2 caixas por volume</div>
                    </div>
                    <label class="toggle">
                        <input type="checkbox" id="embalar">
                        <span class="slider"></span>
                    </label>
                </div>

                <button class="btn-add" id="btnAdd" onclick="adicionarItem()">Adicionar à Lista</button>
            </div>
        </div>

        <div>
            <div class="card">
                <div class="card-title">Itens na Cotação</div>
                <div id="listaItens">
                    <div class="items-empty">📦 Lista vazia</div>
                </div>
                <button id="btnClear" onclick="limparTudo()" style="display:none; background:none; border:none; color:var(--muted); font-size:0.75rem; cursor:pointer; margin-top:10px;">🗑 Limpar tudo</button>
            </div>

            <div class="result-card" id="resultadoTotal" style="display:none">
                <div class="card-title" style="color:var(--accent2)">Resumo da Carga</div>
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-val" id="totalPecas">0</div>
                        <div class="stat-lbl">Peças</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-val" id="totalPeso">0</div>
                        <div class="stat-lbl">Peso (kg)</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-val" id="totalVolumes">0</div>
                        <div class="stat-lbl">Volumes</div>
                    </div>
                </div>
                <div class="card-title">Detalhamento de Volumes</div>
                <div id="detalhamentoVolumes"></div>
            </div>
        </div>
    </main>
</div>

<script>
const dados = {

        { aro:"15x7,5", peso:10, dim:[43,43,26], porCaixa:1 },

        { aro:"18x8,5", peso:15, dim:[53,53,28], porCaixa:1 },
        { aro:"19x4", peso:8, dim:[55,55,17], porCaixa:1 },

        { aro:"20x7,5", peso:18, dim:[58,58,26], porCaixa:1 },

    ],
    "4x4": [
        { aro:"16x6", peso:13, dim:[48,48,22], porCaixa:1 },
        { aro:"16x7", peso:16, dim:[48,48,25], porCaixa:1 },
        { aro:"16x9", peso:14.5, dim:[48,48,30], porCaixa:1 },
        { aro:"17x7", peso:16, dim:[50,50,25], porCaixa:1 },

        { aro:"17x9", peso:20, dim:[49,49,28], porCaixa:1 },
        { aro:"18x7", peso:18, dim:[53,53,25], porCaixa:1 },

    PNEUS: [
        { aro:"125/80R17", peso:4, dim:[64,64,13], porCaixa:1 },

        { aro:"225/45R17", peso:12.1, dim:[64,64,23], porCaixa:1 },
        { aro:"225/60R14", peso:10.7, dim:[63,63,23], porCaixa:1 },
        { aro:"225/60R15", peso:12.1, dim:[66,66,23], porCaixa:1 },
        { aro:"225/70R15", peso:11.6, dim:[70,70,23], porCaixa:1 },
        { aro:"235/40R18", peso:12.5, dim:[65,65,24], porCaixa:1 },
        { aro:"235/60R14", peso:11, dim:[64,64,24], porCaixa:1 },
        { aro:"235/60R15", peso:12, dim:[67,67,24], porCaixa:1 },
        { aro:"245/60R14", peso:11, dim:[65,65,25], porCaixa:1 },
        { aro:"255/60R15", peso:13, dim:[69,69,26], porCaixa:1 },
        { aro:"295/50R15", peso:13, dim:[68,68,30], porCaixa:1 },
    ]
};

let tipoAtual = 'PASSEIO';
let cotacao = [];
let idCounter = 0;

function setTipo(t) {
    tipoAtual = t;
    const tabs = ['PASSEIO','4x4','PNEUS'];
    document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', tabs[i]===t));
    document.getElementById('search').value = '';
    popularItens();
}

function popularItens() {
    const search = document.getElementById('search').value.toLowerCase();
    const sel = document.getElementById('item');
    sel.innerHTML = '';
    (dados[tipoAtual]||[]).forEach((item,i) => {
        if (item.aro.toLowerCase().includes(search)) {
            const o = document.createElement('option');
            o.value = i;
            o.textContent = `${item.aro} (${item.peso}kg)`;
            sel.appendChild(o);
        }
    });
    if (sel.options.length) { sel.selectedIndex = 0; atualizarInfo(); }
    else document.getElementById('itemInfo').textContent = '—';
}

function atualizarInfo() {
    const sel = document.getElementById('item');
    if (!sel.options.length) return;
    const item = dados[tipoAtual][sel.value];
    document.getElementById('itemInfo').innerHTML = `${item.peso}kg/un | ${item.dim.join('x')}cm | ${item.porCaixa} un/cx`;
}

// LOGICA DE VOLUMES CORRIGIDA
function calcularVolumes(item, qtd, embalarDuplo) {
    const [c, l, a] = item.dim;
    const pesoPorCaixa = item.peso * item.porCaixa;
    
    // 1. Descobre quantas CAIXAS físicas existem
    let numCaixas = Math.ceil(qtd / item.porCaixa);
    let volumes = [];

    if (embalarDuplo) {
        // Agrupa de 2 em 2 caixas
        for (let i = 0; i < numCaixas; i += 2) {
            if (i + 1 < numCaixas) {
                // Existe uma segunda caixa para empilhar
                volumes.push({
                    comp: c,
                    larg: l,
                    alt: a * 2, // DOBRA A ALTURA
                    peso: pesoPorCaixa * 2 // SOMA O PESO
                });
            } else {
                // Sobrou apenas uma caixa (ímpar)
                volumes.push({
                    comp: c,
                    larg: l,
                    alt: a,
                    peso: pesoPorCaixa
                });
            }
        }
    } else {
        // Despacho simples: cada caixa é um volume
        for (let i = 0; i < numCaixas; i++) {
            volumes.push({
                comp: c,
                larg: l,
                alt: a,
                peso: pesoPorCaixa
            });
        }
    }
    return volumes;
}

function adicionarItem() {
    const sel = document.getElementById('item');
    const qtd = parseInt(document.getElementById('quantidade').value);
    const embalar = document.getElementById('embalar').checked;
    if (!sel.options.length || isNaN(qtd) || qtd < 1) return;

    const item = dados[tipoAtual][sel.value];
    cotacao.push({ 
        id: idCounter++, 
        tipo: tipoAtual, 
        aro: item.aro, 
        qtd, 
        embalar, 
        pesoUnit: item.peso, 
        volumes: calcularVolumes(item, qtd, embalar) 
    });
    renderItens();
    renderResultado();
}

function remover(id) {
    cotacao = cotacao.filter(c => c.id !== id);
    renderItens(); 
    renderResultado();
}

function limparTudo() {
    if (!confirm('Limpar cotação?')) return;
    cotacao = []; 
    renderItens(); 
    renderResultado();
}

function renderItens() {
    const div = document.getElementById('listaItens');
    document.getElementById('btnClear').style.display = cotacao.length ? 'block' : 'none';

    if (!cotacao.length) {
        div.innerHTML = '<div class="items-empty">📦 Lista vazia</div>';
        return;
    }

    div.innerHTML = cotacao.map(c => `
        <div class="item-card">
            <div class="item-left">
                <span class="badge ${c.embalar ? 'badge-on' : 'badge-off'}">${c.embalar ? 'EMB. DUPLA' : 'SIMPLES'}</span>
                <span class="item-aro">${c.aro}</span>
                <div style="font-size:0.75rem; color:var(--muted); margin-top:4px;">
                    ${c.qtd} un · ${(c.pesoUnit * c.qtd).toFixed(1)}kg · ${c.volumes.length} vol.
                </div>
            </div>
            <button class="btn-del" onclick="remover(${c.id})">✕</button>
        </div>`).join('');
}

function renderResultado() {
    const div = document.getElementById('resultadoTotal');
    if (!cotacao.length) { div.style.display = 'none'; return; }
    div.style.display = 'block';

    let totalPecas = 0, totalPeso = 0, todosVols = [];
    cotacao.forEach(c => {
        totalPecas += c.qtd;
        totalPeso += c.pesoUnit * c.qtd;
        c.volumes.forEach(v => todosVols.push(v));
    });

    const grupos = {};
    todosVols.forEach(v => {
        const k = `${v.comp}x${v.larg}x${v.alt}`;
        if (!grupos[k]) grupos[k] = { comp: v.comp, larg: v.larg, alt: v.alt, count: 0, pesoTotal: 0 };
        grupos[k].count++;
        grupos[k].pesoTotal += v.peso;
    });

    document.getElementById('totalPecas').textContent = totalPecas;
    document.getElementById('totalPeso').textContent = totalPeso.toFixed(1);
    document.getElementById('totalVolumes').textContent = todosVols.length;

    document.getElementById('detalhamentoVolumes').innerHTML = Object.values(grupos).map(g => `
        <div class="vol-row">
            <div><span class="vol-count">${g.count}x</span> ${g.comp}x${g.larg}x${g.alt} cm</div>
            <div style="font-size:0.7rem; color:var(--muted); margin-top:3px;">Peso Total do Grupo: ${g.pesoTotal.toFixed(1)}kg</div>
        </div>`).join('');
}

document.addEventListener('DOMContentLoaded', popularItens);
</script>

</body>
</html>
